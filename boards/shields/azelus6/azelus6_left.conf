
CONFIG_ZMK_BLE=y
CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Only needed without dongle (left half as central):
# battery reporting for peripheral halves
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
